<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>희연이의 저녁 메뉴 🍽️ - 근처 맛집 찾기</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>

  <!-- 앱 상단 바 -->
  <header class="app-bar">
    <h1 class="app-bar__logo">🍽️ 희연이의 저녁 메뉴</h1>
    <p class="app-bar__location" id="app-location">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
      위치 확인 중...
    </p>
  </header>

  <main class="layout">
    <!-- 지도 영역 -->
    <div class="map-area">
      <div id="map"></div>
      <div class="map-loading" id="map-loading">
        <div class="spinner"></div>
        <p>위치를 가져오는 중...</p>
      </div>
      <button id="btn-locate" class="fab-locate" title="현재 위치로 이동">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- 바텀 시트 (모바일) / 사이드바 (데스크탑) -->
    <div class="sheet" id="sheet">
      <!-- 모바일 드래그 핸들 영역 -->
      <div class="sheet__grip-row" id="sheet-toggle">
        <span class="sheet__grip"></span>
      </div>
      <!-- 항상 보이는 요약 정보 + 버튼 -->
      <div class="sheet__peek">
        <div class="sheet__info">
          <h2 class="sheet__title">근처 맛집</h2>
          <span class="sheet__count" id="restaurant-count">검색 중...</span>
        </div>
        <button id="btn-recommend" class="btn-recommend">🤔 뭐먹지?</button>
      </div>
      <!-- 스크롤 맛집 목록 -->
      <ul class="restaurant-list" id="restaurant-list">
        <li class="list-empty">
          <div class="spinner"></div>
          <p>주변 맛집을 검색하고 있어요...</p>
        </li>
      </ul>
    </div>
  </main>

  <!-- 추천 결과 모달 -->
  <div class="modal-backdrop hidden" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="모달 닫기">✕</button>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">🏆 오늘의 맛집 TOP 3</h2>
        <p class="modal-subtitle">추천 점수를 기반으로 엄선했어요</p>
      </div>
      <div class="modal-body" id="recommendation-list"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    // 카카오맵 JavaScript SDK를 config.js 키로 동적 로드
    (function () {
      var key = window.KAKAO_MAP_KEY;
      if (!key || key === 'YOUR_KAKAO_JAVASCRIPT_KEY') {
        var el = document.getElementById('map-loading');
        el.innerHTML = '<p class="error-msg">⚠️ <strong>js/config.js</strong>에 카카오맵 JavaScript 키를 입력해주세요.<br><small>발급: developers.kakao.com → 내 애플리케이션 → 앱 키</small></p>';
        return;
      }
      var script = document.createElement('script');
      script.type = 'text/javascript';
      script.src = '//dapi.kakao.com/v2/maps/sdk.js?appkey=' + key + '&libraries=services&autoload=false';
      script.onload = function () {
        kakao.maps.load(function () {
          if (typeof window.AppInit === 'function') window.AppInit();
        });
      };
      script.onerror = function () {
        document.getElementById('map-loading').innerHTML =
          '<p class="error-msg">⚠️ 카카오맵 SDK 로드 실패.<br><small>API 키 및 도메인 설정을 확인하세요.</small></p>';
      };
      document.head.appendChild(script);
    })();
  </script>
  <script src="js/location.js"></script>
  <script src="js/restaurant.js"></script>
  <script src="js/recommendation.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
