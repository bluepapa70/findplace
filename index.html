<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindPlace 🍽️ - 근처 맛집 찾기</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>

  <header class="header">
    <h1 class="header__logo">🍽️ FindPlace</h1>
    <p class="header__tagline">현재 위치 기반 맛집 추천</p>
  </header>

  <main class="main">
    <div class="map-wrapper">
      <div id="map"></div>
      <div class="map-loading" id="map-loading">
        <div class="spinner"></div>
        <p>위치를 가져오는 중...</p>
      </div>
      <button id="btn-locate" class="btn-locate" title="현재 위치로 이동">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
        </svg>
      </button>
    </div>

    <aside class="sidebar">
      <div class="sidebar__top">
        <div class="sidebar__info">
          <h2 class="sidebar__title">근처 맛집</h2>
          <span class="sidebar__count" id="restaurant-count">불러오는 중...</span>
        </div>
        <button id="btn-recommend" class="btn-recommend">🤔 뭐먹지?</button>
      </div>
      <ul class="restaurant-list" id="restaurant-list">
        <li class="list-empty">
          <div class="spinner"></div>
          <p>주변 맛집을 검색하고 있어요...</p>
        </li>
      </ul>
    </aside>
  </main>

  <!-- 추천 결과 모달 -->
  <div class="modal-backdrop hidden" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="모달 닫기">✕</button>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">🏆 오늘의 맛집 TOP 3</h2>
        <p class="modal-subtitle">추천 점수를 기반으로 엄선했어요</p>
      </div>
      <div class="modal-body" id="recommendation-list"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    // 카카오맵 JavaScript SDK를 config.js 키로 동적 로드
    (function () {
      var key = window.KAKAO_MAP_KEY;
      if (!key || key === 'YOUR_KAKAO_JAVASCRIPT_KEY') {
        var el = document.getElementById('map-loading');
        el.innerHTML = '<p class="error-msg">⚠️ <strong>js/config.js</strong>에 카카오맵 JavaScript 키를 입력해주세요.<br><small>발급: developers.kakao.com → 내 애플리케이션 → 앱 키</small></p>';
        return;
      }
      var script = document.createElement('script');
      script.type = 'text/javascript';
      script.src = '//dapi.kakao.com/v2/maps/sdk.js?appkey=' + key + '&libraries=services&autoload=false';
      script.onload = function () {
        kakao.maps.load(function () {
          if (typeof window.AppInit === 'function') window.AppInit();
        });
      };
      script.onerror = function () {
        document.getElementById('map-loading').innerHTML =
          '<p class="error-msg">⚠️ 카카오맵 SDK 로드 실패.<br><small>API 키 및 도메인 설정을 확인하세요.</small></p>';
      };
      document.head.appendChild(script);
    })();
  </script>
  <script src="js/location.js"></script>
  <script src="js/restaurant.js"></script>
  <script src="js/recommendation.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
